<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Weather 3D</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="panel">

    <div class="panel-header">
        <h2>🌍 Earth Weather 3D</h2>
    </div>
     
    <div class="scene">

        <div id="sun"></div>

        <div id="earth"></div>

    </div>

    <div class="info">

        <h1 id="time">00:00:00</h1>

        <p id="date">Дата</p>

        <h2 id="temperature">--°C</h2>

        <p id="weather">Загрузка погоды...</p>

        <button id="updateWeather">
            Обновить погоду
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
